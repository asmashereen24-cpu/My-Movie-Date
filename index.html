<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Date?</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: #ffe6e6; padding-top: 50px; }
        h1 { color: #cc0000; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; }
        .yes { background-color: #4CAF50; color: white; }
        .no { background-color: #f44336; color: white; }
    </style>
</head>
<body>
 
    <h1>Will you go to the Obsession movie with me please? 🎬🍿</h1>
    <p>Pick an option below!</p>
 
    <!-- Change the Google Link to a link of your choice, like a movie trailer! -->
    <button class="btn yes" onclick="window.location.href='https://google.com'">YES! 😍</button>
    
    <!-- This button pops up an alert when clicked -->
    <button class="btn no" onclick="alert('Wrong answer! Try again. 😉')">No 😢</button>
 
</body>
</html>
